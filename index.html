<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C'est qui qui fait ? — BDP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #f5e000;
      --dark:   #1d1d1b;
      --white:  #ffffff;
      --bg:     #f0ede6;
      --red:    #ff5c5c;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg);
      font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px;
      gap: 16px;
    }

    /* ── Fireworks overlay ── */
    #fireworks {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Logo ── */
    .logo {
      width: 66px;
      height: auto;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.25));
      flex-shrink: 0;
    }

    /* ── Title ── */
    h1 {
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 900;
      color: var(--dark);
      text-align: center;
      line-height: 1.05;
      text-shadow: 1px 2px 5px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .subtitle {
      font-size: 0.8rem;
      font-weight: 700;
      color: #aaa;
      text-align: center;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    /* ── Wheel ── */
    .wheel-container {
      position: relative;
      width: 310px;
      height: 310px;
      flex-shrink: 0;
      filter: drop-shadow(2px 6px 18px rgba(0,0,0,0.22));
    }

    .pointer {
      position: absolute;
      top: -17px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 24px solid var(--dark);
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    canvas#wheel {
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s;
      width: 310px;
      height: 310px;
    }
    canvas#wheel:hover { transform: scale(1.02); }

    /* ── Center button ── */
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      border-radius: 50%;
      background: var(--white);
      border: 4px solid #ddd;
      color: var(--dark);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 10;
      box-shadow: 2px 4px 14px rgba(0,0,0,0.16);
      transition: background 0.15s, transform 0.12s, border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.25;
    }
    .center-btn:hover {
      background: var(--dark);
      color: var(--yellow);
      border-color: var(--dark);
      transform: translate(-50%, -50%) scale(1.06);
    }
    .center-btn:active  { transform: translate(-50%, -50%) scale(0.97); }
    .center-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: translate(-50%, -50%);
    }

    /* ── Result card ── */
    .result-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
      min-width: 260px;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      box-shadow: 2px 5px 20px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .result-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .result-header {
      background: var(--yellow);
      padding: 12px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.3s;
    }
    .result-header.nope { background: var(--yellow); }

    .result-label {
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--dark);
    }

    .result-body { padding: 16px 44px 20px; }
    .result-name {
      font-size: 2.3rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 5px;
    }
    .result-task {
      font-size: 0.82rem;
      font-weight: 700;
      color: #666;
    }

    /* ── BDP badge ── */
    .bdp-badge {
      position: fixed;
      bottom: 14px; right: 18px;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #bbb;
      text-transform: uppercase;
    }
  </style>
</head>

  <h1>C'est qui qui fait ?</h1>
  <p class="subtitle">Tournez la roue pour décider</p>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="310" height="310"></canvas>
    <button class="center-btn" id="spinBtn" onclick="spin()">Tourner</button>
  </div>

  <div class="result-card" id="result">
    <div class="result-header" id="resultHeader">
      <div class="result-label" id="resultLabel">C'est</div>
    </div>
    <div class="result-body">
      <div class="result-name" id="resultName">—</div>
      <div class="result-task" id="resultTask">qui fait la prochaine tâche !</div>
    </div>
  </div>

  <div class="bdp-badge">BDP Studio</div>

  <script>
    // ═══════════════════════════════════════════════
    //  WHEEL
    // ═══════════════════════════════════════════════
    const canvas = document.getElementById('wheel');
    const ctx    = canvas.getContext('2d');
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const r  = canvas.width  / 2 - 3;

    const segments = [
      { label: 'François',      color: '#ffffff', textColor: '#1d1d1b', nope: false },
      { label: 'Benjamin',      color: '#e6e6e6', textColor: '#1d1d1b', nope: false },
      { label: 'François',      color: '#ffffff', textColor: '#1d1d1b', nope: false },
      { label: 'on le fait pas',color: '#f5e000', textColor: '#1d1d1b', nope: true  },
      { label: 'Benjamin',      color: '#e6e6e6', textColor: '#1d1d1b', nope: false },
      { label: 'François',      color: '#ffffff', textColor: '#1d1d1b', nope: false },
      { label: 'Benjamin',      color: '#e6e6e6', textColor: '#1d1d1b', nope: false },
    ];

    const numSeg  = segments.length;
    const arcSize = (2 * Math.PI) / numSeg;
    let currentAngle = 0;
    let spinning     = false;

    function drawWheel(angle) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSeg; i++) {
        const start = angle + i * arcSize;
        const end   = start + arcSize;
        const seg   = segments[i];

        // Fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();

        // Divider lines only
        ctx.strokeStyle = '#c0c0c0';
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        // Label — shrink font for "on le fait pas"
        const isLong = seg.label.length > 9;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arcSize / 2);
        ctx.textAlign  = 'right';
        ctx.fillStyle  = seg.textColor;
        ctx.font       = `bold ${isLong ? 12 : 15}px Nunito, "Arial Rounded MT Bold", sans-serif`;
        ctx.shadowColor   = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur    = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.fillText(seg.label, r - 16, isLong ? 4 : 5);
        ctx.restore();
      }

      // Yellow outer ring only (no black inner ring)
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = '#f5e000';
      ctx.lineWidth   = 6;
      ctx.stroke();
    }

    drawWheel(currentAngle);

    function spin() {
      if (spinning) return;
      spinning = true;

      const btn = document.getElementById('spinBtn');
      btn.disabled    = true;
      btn.textContent = '···';

      document.getElementById('result').classList.remove('visible');
      stopFireworks();

      const extraSpins  = (5 + Math.random() * 5) * 2 * Math.PI;
      const targetAngle = currentAngle + extraSpins + Math.random() * 2 * Math.PI;
      const duration    = 3500 + Math.random() * 800;
      const startTime   = performance.now();
      const startAngle  = currentAngle;

      function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle    = targetAngle % (2 * Math.PI);
          spinning        = false;
          btn.disabled    = false;
          btn.textContent = 'Tourner';
          showResult();
        }
      }

      requestAnimationFrame(frame);
    }

    function showResult() {
      // Pointer is at the top = canvas angle 3π/2
      const pointerAngle = 3 * Math.PI / 2;
      const relAngle     = ((pointerAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const winIndex     = Math.floor(relAngle / arcSize) % numSeg;
      const winner       = segments[winIndex];

      const header = document.getElementById('resultHeader');
      const label  = document.getElementById('resultLabel');
      const name   = document.getElementById('resultName');
      const task   = document.getElementById('resultTask');

      if (winner.nope) {
        header.className = 'result-header nope';
        label.textContent = '😮‍💨';
        name.textContent  = 'On le fait pas';
        task.textContent  = 'La roue a parlé. Bonne nouvelle !';
      } else {
        header.className = 'result-header';
        label.textContent = 'C\'est';
        name.textContent  = winner.label;
        task.textContent  = 'qui fait la prochaine tâche !';
        launchFireworks();
      }

      document.getElementById('result').classList.add('visible');
    }

    canvas.addEventListener('click', spin);

    // ═══════════════════════════════════════════════
    //  FIREWORKS
    // ═══════════════════════════════════════════════
    const fwCanvas = document.getElementById('fireworks');
    const fwCtx    = fwCanvas.getContext('2d');
    let fwParticles = [];
    let fwAnimId    = null;
    let fwActive    = false;

    function resizeFW() {
      fwCanvas.width  = window.innerWidth;
      fwCanvas.height = window.innerHeight;
    }
    resizeFW();
    window.addEventListener('resize', resizeFW);

    const FW_COLORS = ['#f5e000', '#1d1d1b', '#ffffff', '#ffc400', '#ff6b6b', '#6bdfd2', '#b388ff'];

    function createBurst(x, y, size = 1) {
      const count = Math.floor((38 + Math.random() * 22) * size);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const speed = (2.5 + Math.random() * 5.5) * size;
        fwParticles.push({
          x, y,
          vx:      Math.cos(angle) * speed,
          vy:      Math.sin(angle) * speed,
          alpha:   1,
          radius:  (2.5 + Math.random() * 3) * size,
          color:   FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)],
          decay:   0.011 + Math.random() * 0.013,
          gravity: 0.07,
        });
      }
    }

    function launchFireworks() {
      fwActive    = true;
      fwParticles = [];
      let bursts  = 0;

      function scheduleBurst() {
        if (!fwActive || bursts >= 14) return;
        bursts++;
        const x    = fwCanvas.width  * (0.15 + Math.random() * 0.70);
        const y    = fwCanvas.height * (0.05 + Math.random() * 0.50);
        const size = 0.7 + Math.random() * 0.8;
        createBurst(x, y, size);
        setTimeout(scheduleBurst, 220 + Math.random() * 280);
      }

      scheduleBurst();
      if (fwAnimId) cancelAnimationFrame(fwAnimId);
      animateFW();
    }

    function stopFireworks() {
      fwActive    = false;
      fwParticles = [];
      if (fwAnimId) cancelAnimationFrame(fwAnimId);
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    }

    function animateFW() {
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      fwParticles = fwParticles.filter(p => p.alpha > 0.02);

      for (const p of fwParticles) {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        p.alpha -= p.decay;

        fwCtx.save();
        fwCtx.globalAlpha = Math.max(0, p.alpha);
        fwCtx.shadowColor = p.color;
        fwCtx.shadowBlur  = 7;
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
        fwCtx.fillStyle = p.color;
        fwCtx.fill();
        fwCtx.restore();
      }

      if (fwParticles.length > 0 || fwActive) {
        fwAnimId = requestAnimationFrame(animateFW);
      } else {
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }
  </script>
</body>
</html>
