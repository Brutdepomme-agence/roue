<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juju va faire à François 🤠</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink1:  #FFB3C6;
      --pink2:  #FF6B9D;
      --pink3:  #FF4D7E;
      --pinkbg: #FFF0F5;
      --dark:   #3D0020;
      --white:  #ffffff;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: radial-gradient(ellipse at 60% 0%, #FFD6E7 0%, var(--pinkbg) 60%);
      font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      gap: 14px;
    }

    /* ── Hearts canvas ── */
    #hearts {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Cowboy hat ── */
    .cowboy-hat {
      font-size: 3rem;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.15));
      flex-shrink: 0;
      line-height: 1;
      user-select: none;
    }

    /* ── Title ── */
    h1 {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 900;
      color: var(--dark);
      text-align: center;
      line-height: 1.1;
      text-shadow: 1px 2px 5px rgba(255,107,157,0.3);
      flex-shrink: 0;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 700;
      color: #C06;
      opacity: 0.7;
      text-align: center;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── Wheel ── */
    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      flex-shrink: 0;
      filter: drop-shadow(2px 8px 22px rgba(255,77,126,0.3));
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.6rem;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      line-height: 1;
    }

    canvas#wheel {
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s;
      width: 300px;
      height: 300px;
    }
    canvas#wheel:hover { transform: scale(1.02); }

    /* ── Center button ── */
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 68px; height: 68px;
      border-radius: 50%;
      background: var(--white);
      border: 4px solid var(--pink1);
      color: var(--dark);
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10;
      box-shadow: 2px 4px 14px rgba(255,107,157,0.25);
      transition: background 0.15s, transform 0.12s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center-btn:hover {
      background: var(--pink3);
      border-color: var(--pink3);
      transform: translate(-50%, -50%) scale(1.08);
    }
    .center-btn:active  { transform: translate(-50%, -50%) scale(0.96); }
    .center-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: translate(-50%, -50%);
    }

    /* ── Result card ── */
    .result-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
      min-width: 260px;
      max-width: 340px;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      box-shadow: 2px 6px 24px rgba(255,77,126,0.25);
      flex-shrink: 0;
    }
    .result-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .result-header {
      background: linear-gradient(135deg, var(--pink1), var(--pink2));
      padding: 12px 32px;
      box-shadow: 0 2px 8px rgba(255,107,157,0.3);
    }
    .result-label {
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--white);
    }
    .result-body { padding: 14px 32px 18px; }
    .result-name {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .result-sub {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--pink2);
    }

    /* ── Boot badges ── */
    .boots {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      opacity: 0.45;
      letter-spacing: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="hearts"></canvas>

  <div class="cowboy-hat">🤠</div>
  <h1>Juju va faire à François</h1>
  <p class="subtitle">Tourne la roue pour le savoir</p>

  <div class="wheel-container">
    <div class="pointer">🤠</div>
    <canvas id="wheel" width="300" height="300"></canvas>
    <button class="center-btn" id="spinBtn" onclick="spin()">💕</button>
  </div>

  <div class="result-card" id="result">
    <div class="result-header">
      <div class="result-label" id="resultLabel">Juju va lui faire…</div>
    </div>
    <div class="result-body">
      <div class="result-name" id="resultName">—</div>
      <div class="result-sub" id="resultSub">🥾 yeehaw 🥾</div>
    </div>
  </div>

  <div class="boots">🥾🤠🥾</div>

  <script>
    // ═══════════════════════════════════
    //  WHEEL
    // ═══════════════════════════════════
    const canvas = document.getElementById('wheel');
    const ctx    = canvas.getContext('2d');
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const r  = canvas.width  / 2 - 3;

    const segments = [
      { label: 'Un bisou\nde 6 secondes', color: '#FFB3C6', textColor: '#3D0020' },
      { label: '1 spectacle',             color: '#FF8FAD', textColor: '#ffffff' },
      { label: 'Des oeufs\nau ketchup',   color: '#FFD1DC', textColor: '#3D0020' },
      { label: 'Un croche-pied',          color: '#FF6B9D', textColor: '#ffffff' },
      { label: 'Un prout\nsous la couette', color: '#FFB3C6', textColor: '#3D0020' },
      { label: 'Un massage',              color: '#FF4D7E', textColor: '#ffffff' },
      { label: 'Une prise\nde judo',      color: '#FFD1DC', textColor: '#3D0020' },
    ];

    const numSeg  = segments.length;
    const arcSize = (2 * Math.PI) / numSeg;
    let currentAngle = 0;
    let spinning     = false;

    function drawWheel(angle) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSeg; i++) {
        const start = angle + i * arcSize;
        const end   = start + arcSize;
        const seg   = segments[i];

        // Fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();

        // Divider
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth   = 2;
        ctx.stroke();

        // Label (handle \n for two lines)
        const lines = seg.label.split('\n');
        const fontSize = lines.some(l => l.length > 10) ? 10 : 12;
        const midAngle = start + arcSize / 2;
        const textR    = r - 20;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(midAngle);
        ctx.textAlign  = 'right';
        ctx.fillStyle  = seg.textColor;
        ctx.font       = `900 ${fontSize}px Nunito, sans-serif`;
        ctx.shadowColor   = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur    = 3;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;

        if (lines.length === 1) {
          ctx.fillText(lines[0], textR, 4);
        } else {
          const lh = fontSize + 2;
          ctx.fillText(lines[0], textR, -lh / 2 + 2);
          ctx.fillText(lines[1], textR,  lh / 2 + 2);
        }
        ctx.restore();
      }

      // Pink outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = '#FF6B9D';
      ctx.lineWidth   = 5;
      ctx.stroke();
    }

    drawWheel(currentAngle);

    function spin() {
      if (spinning) return;
      spinning = true;

      const btn = document.getElementById('spinBtn');
      btn.disabled    = true;
      btn.textContent = '💫';

      document.getElementById('result').classList.remove('visible');
      stopHearts();

      const extraSpins  = (5 + Math.random() * 5) * 2 * Math.PI;
      const targetAngle = currentAngle + extraSpins + Math.random() * 2 * Math.PI;
      const duration    = 3500 + Math.random() * 800;
      const startTime   = performance.now();
      const startAngle  = currentAngle;

      function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle    = targetAngle % (2 * Math.PI);
          spinning        = false;
          btn.disabled    = false;
          btn.textContent = '💕';
          showResult();
        }
      }

      requestAnimationFrame(frame);
    }

    function showResult() {
      const pointerAngle = 3 * Math.PI / 2;
      const relAngle     = ((pointerAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const winIndex     = Math.floor(relAngle / arcSize) % numSeg;
      const winner       = segments[winIndex];

      document.getElementById('resultName').textContent = winner.label.replace('\n', ' ');
      document.getElementById('result').classList.add('visible');
      launchHearts();
    }

    canvas.addEventListener('click', spin);

    // ═══════════════════════════════════
    //  HEARTS
    // ═══════════════════════════════════
    const hw      = document.getElementById('hearts');
    const hctx    = hw.getContext('2d');
    let hParticles = [];
    let hAnimId    = null;
    let hActive    = false;

    function resizeHW() {
      hw.width  = window.innerWidth;
      hw.height = window.innerHeight;
    }
    resizeHW();
    window.addEventListener('resize', resizeHW);

    const HEART_EMOJIS = ['💕','💖','💗','💓','💞','🩷','❤️','💝'];
    const HEART_SIZES  = [14, 18, 22, 26, 30];

    function spawnHeart() {
      hParticles.push({
        x:     hw.width * (0.05 + Math.random() * 0.90),
        y:     hw.height + 20,
        vy:    -(1.2 + Math.random() * 2.2),
        vx:    (Math.random() - 0.5) * 0.8,
        alpha: 1,
        decay: 0.006 + Math.random() * 0.006,
        size:  HEART_SIZES[Math.floor(Math.random() * HEART_SIZES.length)],
        emoji: HEART_EMOJIS[Math.floor(Math.random() * HEART_EMOJIS.length)],
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.04 + Math.random() * 0.04,
      });
    }

    function launchHearts() {
      hActive    = true;
      hParticles = [];
      let count  = 0;

      function scheduleHeart() {
        if (!hActive || count >= 40) return;
        count++;
        spawnHeart();
        setTimeout(scheduleHeart, 80 + Math.random() * 120);
      }

      scheduleHeart();
      if (hAnimId) cancelAnimationFrame(hAnimId);
      animateHearts();
    }

    function stopHearts() {
      hActive    = false;
      hParticles = [];
      if (hAnimId) cancelAnimationFrame(hAnimId);
      hctx.clearRect(0, 0, hw.width, hw.height);
    }

    function animateHearts() {
      hctx.clearRect(0, 0, hw.width, hw.height);
      hParticles = hParticles.filter(p => p.alpha > 0.02 && p.y > -40);

      for (const p of hParticles) {
        p.wobble += p.wobbleSpeed;
        p.x      += p.vx + Math.sin(p.wobble) * 0.5;
        p.y      += p.vy;
        p.alpha  -= p.decay;

        hctx.save();
        hctx.globalAlpha = Math.max(0, p.alpha);
        hctx.font        = `${p.size}px serif`;
        hctx.textAlign   = 'center';
        hctx.textBaseline = 'middle';
        hctx.fillText(p.emoji, p.x, p.y);
        hctx.restore();
      }

      if (hParticles.length > 0 || hActive) {
        hAnimId = requestAnimationFrame(animateHearts);
      } else {
        hctx.clearRect(0, 0, hw.width, hw.height);
      }
    }
  </script>
</body>
</html>
